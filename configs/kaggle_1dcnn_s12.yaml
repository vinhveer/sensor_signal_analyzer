dataset_name: dataset_1_10
model_name: 1dcnn

data:
  kaggle_dataset_subdir: Processed
  kaggle_working_dataset_root: /kaggle/working/dataset_1_10
  kaggle_input_root_candidates:
    - /kaggle/input/datasets/thanhhieu03092004/data-set-1-10/dataset_1_10
  expected_channels: 2
  end_t: null
  convert_overwrite: false
  acc_columns:
    - "Acceleration - x (m/s\u00b2)"
    - "Acceleration - x (m/s\u00b2).1"
  source_subdir_candidates:
    - "."
    - "Processed"
  csv_sep_candidates:
    - ","
    - ";"
    - null

windowing:
  window: 1024
  overlap: 0.75
  return_ct: true
  eps: 1e-8

split:
  expected_files_per_class: 18
  train_run_ids: [1, 2, 3, 4]
  val_run_ids: [5]
  test_run_ids: [6]
  split_seed: 42

training:
  seeds: [42]
  batch_size: 32
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.001
  num_workers: 0
  grad_clip_norm: 1.0

model:
  name: cnn1d
  fc_dim: 128
  dropout: 0.2

outputs:
  root: /kaggle/working/History
  save_zip: true
